<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Margin Calculator</title>
  <style>
    :root{
      --bg:#081021;
      --panel:#101a35;
      --panel-2:#162245;
      --line:#22376f;
      --line-soft:#1a2d5a;
      --text:#eef3ff;
      --muted:#9fb0da;
      --accent:#7aa2ff;
      --accent-2:#7cf2d3;
      --danger:#ff7b7b;
      --shadow:0 14px 34px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,"Pretendard","Noto Sans KR",system-ui,sans-serif;
      background:radial-gradient(circle at top,#14224b 0%,#081021 42%,#050a16 100%);
      color:var(--text);
    }
    .wrap{max-width:1380px;margin:0 auto;padding:24px 20px 48px}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
    .hero h1{margin:0;font-size:28px;font-weight:800;letter-spacing:-.03em}
    .hero p{margin:8px 0 0;color:var(--muted);font-size:14px}

    .grid{display:grid;gap:16px}
    .top-grid{grid-template-columns:1.2fr 1fr 1fr}
    .summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .input-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .result-grid{grid-template-columns:repeat(4,minmax(0,1fr))}

    .card{
      background:linear-gradient(180deg,rgba(20,33,69,.94),rgba(12,20,42,.98));
      border:1px solid var(--line-soft);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 0}
    .card-body{padding:18px}
    .card h2,.card h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.02em}
    .sub{color:var(--muted);font-size:12px}

    .summary-item{padding:18px;border:1px solid var(--line);border-radius:16px;background:rgba(8,16,37,.4)}
    .summary-item .label{color:var(--muted);font-size:12px;margin-bottom:10px}
    .summary-item .value{font-size:18px;font-weight:800}

    .btn{
      border:none;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;
      background:#24396f;color:var(--text);transition:.16s ease;white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
    .btn.primary{background:linear-gradient(135deg,#ff8b7c,#ff6cab)}
    .btn.ghost{background:#18264d;border:1px solid var(--line)}
    .btn.link{background:#19264d;color:#c9d9ff;border:1px solid var(--line)}
    .btn.live-fx{background:linear-gradient(135deg,#34d1ff,#5f8cff 55%,#b06cff);color:#fff;border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(66,207,255,.22)}
    .btn.live-fx:hover{filter:brightness(1.05);transform:translateY(-1px)}

    .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .field{display:flex;flex-direction:column;gap:8px}
    .field label{font-size:13px;color:#dfe8ff;font-weight:700}
    .field input{
      width:100%;height:46px;border-radius:14px;border:1px solid var(--line);
      background:#0c1632;color:var(--text);padding:0 14px;font-size:15px;outline:none;
    }
    .field input:focus{border-color:#5a81df;box-shadow:0 0 0 3px rgba(122,162,255,.15)}
    .field small{color:var(--muted);font-size:11px}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

    .results-title{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:24px 0 12px}
    .results-title h2{margin:0;font-size:18px}
    .results-title p{margin:4px 0 0;color:var(--muted);font-size:13px}

    .result-card{padding:16px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(8,16,37,.3),rgba(8,16,37,.55))}
    .result-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
    .flag{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.15)}
    .result-name{display:flex;align-items:center;gap:10px;font-weight:800}
    .currency{font-size:12px;color:var(--muted)}
    .metric{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px dashed rgba(159,176,218,.18)}
    .metric:first-of-type{border-top:none;padding-top:0}
    .metric .k{font-size:12px;color:var(--muted)}
    .metric .v{font-size:15px;font-weight:800;text-align:right}
    .metric .v.em{color:#fff0c6}

    .modal-backdrop{position:fixed;inset:0;background:rgba(1,5,12,.64);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
    .modal-backdrop.show{display:flex}
    .modal{width:min(980px,100%);max-height:88vh;overflow:auto;background:#0c1631;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .modal-head{position:sticky;top:0;background:#0c1631;border-bottom:1px solid var(--line);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;z-index:2}
    .modal-body{padding:18px 20px 22px}
    .close{background:transparent;border:none;color:#d7e4ff;font-size:24px;cursor:pointer}

    table{width:100%;border-collapse:collapse}
    th,td{padding:11px 10px;border-bottom:1px solid rgba(159,176,218,.14);text-align:left;font-size:13px;vertical-align:middle}
    th{color:#dce7ff;background:rgba(255,255,255,.03);position:sticky;top:0}
    td input{width:100%;height:38px;border-radius:10px;border:1px solid var(--line);background:#0b1430;color:var(--text);padding:0 10px}
    .cat-row td{background:rgba(255,255,255,.03);font-weight:800;color:#dce7ff}
    .footer-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;flex-wrap:wrap}

    .note{color:var(--muted);font-size:12px;line-height:1.45}

    @media (max-width:1200px){
      .top-grid,.summary-grid,.input-grid,.result-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:760px){
      .wrap{padding:18px 14px 40px}
      .top-grid,.summary-grid,.input-grid,.result-grid,.field-grid{grid-template-columns:1fr}
      .hero{flex-direction:column}
    }
  
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}
input[type="number"]{
  -moz-appearance:textfield;
  appearance:textfield;
}


    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button{
      -webkit-appearance:none;
      margin:0;
    }
    input[type="number"]{
      -moz-appearance:textfield;
      appearance:textfield;
    }

</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>Shopee Margin Calculator</h1>
        <p>한눈에 보는 다크톤 구조 · 설정은 카드 안에서만 관리</p>
      </div>
    </section>

    <section class="grid top-grid">
      <article class="card">
        <div class="card-head">
          <div>
            <h2>상품 정보</h2>
            <div class="sub">필수 값만 간단하게 입력</div>
          </div>
        </div>
        <div class="card-body">
          <div class="field-grid">
            <div class="field"><label>상품명</label><input id="productName" placeholder="예: 향수 50ml" /></div>
            <div class="field"><label>제품구매가 (KRW)</label><input id="cost" type="number" min="0" step="1" value="0" /></div>
            <div class="field"><label>포장비용 (KRW)</label><input id="pack" type="number" min="0" step="1" value="0" /></div>
            <div class="field"><label>국내배송비 (KRW)</label><input id="domestic" type="number" min="0" step="1" value="0" /></div>
            <div class="field"><label>희망 마진율 (%)</label><input id="margin" type="number" min="0" step="0.1" value="25" /></div>
            <div class="field"><label>실중량 (g)</label><input id="actualWeight" type="number" min="0" step="1" value="0" /></div>
            <div class="field"><label>가로 (cm)</label><input id="length" type="number" min="0" step="0.1" value="0" /></div>
            <div class="field"><label>세로 (cm)</label><input id="width" type="number" min="0" step="0.1" value="0" /></div>
            <div class="field"><label>높이 (cm)</label><input id="height" type="number" min="0" step="0.1" value="0" /></div>
          </div>
          <div class="toolbar">
            <button class="btn primary" id="calcBtn">계산하기</button>
            <button class="btn ghost" id="resetBtn">초기화</button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-head">
          <div>
            <h2>환율 요약</h2>
            <div class="sub">기본값 0 / 저장 후 반영</div>
          </div>
          <button class="btn" id="openFx">⚙️</button>
        </div>
        <div class="card-body">
          <div class="grid summary-grid" id="fxSummary"></div>
          <div class="toolbar">
            <button class="btn link" id="hanaBtn">LIVE 환율</button>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-head">
          <div>
            <h2>수수료 요약</h2>
            <div class="sub">국가별 주요 수수료 묶음 확인</div>
          </div>
          <button class="btn" id="openFee">⚙️</button>
        </div>
        <div class="card-body">
          <div class="grid summary-grid" id="feeSummary"></div>
          <p class="note" style="margin-top:14px">비율(%) 항목과 고정금액 항목을 각각 입력해 주세요.</p>
        </div>
      </article>
    </section>

    <section class="results-title">
      <div>
        <h2>국가별 계산 결과</h2>
        <p>최종판매가 = 실제 판매 기준 가격 / 추천등록가 = 최종판매가의 30% 인상</p>
      </div>
    </section>
    <section class="grid result-grid" id="results"></section>
  </div>

  <div class="modal-backdrop" id="fxModalWrap">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>환율 설정</h3>
          <div class="sub">1 KRW 당 현지통화 값</div>
        </div>
        <button class="close" data-close="fxModalWrap">×</button>
      </div>
      <div class="modal-body">
        <table>
          <thead><tr><th>국가</th><th>통화</th><th>환율</th></tr></thead>
          <tbody id="fxTable"></tbody>
        </table>
        <div class="footer-actions">
          <button class="btn ghost" data-close="fxModalWrap">닫기</button>
          <button class="btn primary" id="saveFx">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="feeModalWrap">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>국가별 수수료 설정</h3>
          <div class="sub">카테고리별 상세 항목 입력</div>
        </div>
        <button class="close" data-close="feeModalWrap">×</button>
      </div>
      <div class="modal-body">
        <table>
          <thead>
            <tr>
              <th style="width:280px">항목</th>
              <th>SG</th><th>TW</th><th>TH</th><th>MY</th><th>VN</th><th>PH</th><th>BR</th><th>MX</th>
            </tr>
          </thead>
          <tbody id="feeTable"></tbody>
        </table>
        <div class="footer-actions">
          <button class="btn ghost" data-close="feeModalWrap">닫기</button>
          <button class="btn primary" id="saveFee">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const countries = [
      { code:'SG', name:'싱가포르', currency:'SGD', flag:'https://flagcdn.com/w40/sg.png' },
      { code:'TW', name:'대만', currency:'TWD', flag:'https://flagcdn.com/w40/tw.png' },
      { code:'TH', name:'태국', currency:'THB', flag:'https://flagcdn.com/w40/th.png' },
      { code:'MY', name:'말레이시아', currency:'MYR', flag:'https://flagcdn.com/w40/my.png' },
      { code:'VN', name:'베트남', currency:'VND', flag:'https://flagcdn.com/w40/vn.png' },
      { code:'PH', name:'필리핀', currency:'PHP', flag:'https://flagcdn.com/w40/ph.png' },
      { code:'BR', name:'브라질', currency:'BRL', flag:'https://flagcdn.com/w40/br.png' },
      { code:'MX', name:'멕시코', currency:'MXN', flag:'https://flagcdn.com/w40/mx.png' },
    ];

    const roundIntMarkets = new Set(['TW','TH','VN','PH']);
    const storageKeyFx = 'shopeeCalcFx_v3';
    const storageKeyFee = 'shopeeCalcFee_v3';

    const defaultFx = { SG:0, TW:0, TH:0, MY:0, VN:0, PH:0, BR:0, MX:0 };

    const feeStructure = [
      { key:'selling_fee', label:'판매수수료 (%)' },
      { key:'transaction_fee', label:'거래수수료 (%)' },
      { key:'ccb_fee', label:'CCB (%)' },
      { key:'fsp_fee', label:'FSP (%)' },
      { key:'withdrawal_fee', label:'인출수수료 (%)' },
      { key:'traffic_growth_fee', label:'트래픽 성장 수수료 (%)' },
      { key:'platform_shipping_fee', label:'플랫폼 배송비 (%)' },
      { key:'seller_pit', label:'개인 사업자(셀러) PIT (%)' },
      { key:'platform_support_fee_fixed', label:'플랫폼 지원 수수료 (고정금액)' },
      { key:'platform_infra_service_fixed', label:'플랫폼 인프라 서비스 (고정금액)' },
      { key:'customs_fee_fixed', label:'세관 수수료 (고정금액)' },
    ];

    const defaultFeeValue = {
      selling_fee:0,
      transaction_fee:0,
      ccb_fee:0,
      fsp_fee:0,
      withdrawal_fee:0,
      traffic_growth_fee:0,
      platform_shipping_fee:0,
      seller_pit:0,
      platform_support_fee_fixed:0,
      platform_infra_service_fixed:0,
      customs_fee_fixed:0
    };

    const defaultFees = Object.fromEntries(countries.map(c => [c.code, { ...defaultFeeValue }]));

    let fxRates = loadJson(storageKeyFx, defaultFx);
    let feeRates = loadJson(storageKeyFee, defaultFees);
    const shippingTables = {};

    function loadJson(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        return raw ? { ...fallback, ...JSON.parse(raw) } : structuredClone(fallback);
      }catch{ return structuredClone(fallback); }
    }

    function saveJson(key, value){ localStorage.setItem(key, JSON.stringify(value)); }

    function fmtSmart(num, countryCode){
      if (!isFinite(num)) return '-';
      if (countryCode === 'KRW') return Math.round(num).toLocaleString('ko-KR');
      if (roundIntMarkets.has(countryCode)) return Math.round(num).toLocaleString('ko-KR');
      const fixed = Math.abs(num) >= 100 ? 2 : 3;
      return Number(num.toFixed(fixed)).toLocaleString('ko-KR');
    }

    function getAppliedWeight(){
      const actual = +document.getElementById('actualWeight').value || 0;
      const l = +document.getElementById('length').value || 0;
      const w = +document.getElementById('width').value || 0;
      const h = +document.getElementById('height').value || 0;
      const volumetric = (l*w*h/6000) * 1000;
      return Math.ceil(Math.max(actual, volumetric) / 10) * 10 || 0;
    }

    function getBaseCost(){
      return (+document.getElementById('cost').value || 0) + (+document.getElementById('pack').value || 0) + (+document.getElementById('domestic').value || 0);
    }

    function getShippingCost(country, weight){
      if (country === 'TW') return Math.ceil(weight / 10) * 1.30;
      if (country === 'MY') return Math.ceil(weight / 10) * 0.20;
      const rows = shippingTables[country];
      if (!rows || !rows.length || !weight) return 0;
      const found = rows.find(row => weight <= Number(row.max_weight || row.maxWeight || row.weight || 0));
      const row = found || rows[rows.length - 1];
      return Number(row.cost ?? row.price ?? row.rate ?? 0);
    }

    function totalPercentFee(code){
      const f = feeRates[code] || defaultFeeValue;
      return (
        f.selling_fee +
        f.transaction_fee +
        f.ccb_fee +
        f.fsp_fee +
        f.withdrawal_fee +
        f.traffic_growth_fee +
        f.platform_shipping_fee +
        f.seller_pit
      ) / 100;
    }

    function totalFixedFee(code){
      const f = feeRates[code] || defaultFeeValue;
      return (
        (f.platform_support_fee_fixed || 0) +
        (f.platform_infra_service_fixed || 0) +
        (f.customs_fee_fixed || 0)
      );
    }

    function calculateCountry(code){
      const appliedWeight = getAppliedWeight();
      const baseKrw = getBaseCost();
      const marginRate = (+document.getElementById('margin').value || 0) / 100;
      const fx = +fxRates[code] || 0;
      const shippingLocal = getShippingCost(code, appliedWeight);
      const shippingKrw = fx ? (shippingLocal / fx) : 0;
      const percentFee = totalPercentFee(code);
      const fixedLocal = totalFixedFee(code);
      const fixedKrw = fx ? (fixedLocal / fx) : 0;
      const costKrw = baseKrw + shippingKrw + fixedKrw;
      const denominator = Math.max(0.01, 1 - marginRate - percentFee);
      let finalLocal = fx ? (costKrw / denominator) * fx : 0;
      if (roundIntMarkets.has(code)) finalLocal = Math.round(finalLocal);
      else finalLocal = Number(finalLocal.toFixed(2));
      const recommended = roundIntMarkets.has(code) ? Math.round(finalLocal * 1.3) : Number((finalLocal * 1.3).toFixed(2));
      const feeAmtLocal = finalLocal * percentFee + fixedLocal;
      return { appliedWeight, baseKrw, shippingLocal, shippingKrw, finalLocal, recommended, feeAmtLocal };
    }

    function renderResults(){
      const box = document.getElementById('results');
      box.innerHTML = '';
      countries.forEach(c => {
        const r = calculateCountry(c.code);
        const item = document.createElement('article');
        item.className = 'result-card';
        item.innerHTML = `
          <div class="result-head">
            <div class="result-name"><img class="flag" src="${c.flag}" alt="${c.code}"><span>${c.name}</span></div>
            <div class="currency">${c.currency}</div>
          </div>
          <div class="metric"><div class="k">최종판매가</div><div class="v em">${fmtSmart(r.finalLocal, c.code)} ${c.currency}</div></div>
          <div class="metric"><div class="k">추천등록가</div><div class="v">${fmtSmart(r.recommended, c.code)} ${c.currency}</div></div>
          <div class="metric"><div class="k">판매자 배송비</div><div class="v">${fmtSmart(r.shippingLocal, c.code)} ${c.currency}</div></div>
          <div class="metric"><div class="k">총 기본원가</div><div class="v">${fmtSmart(r.baseKrw + r.shippingKrw, 'KRW')} KRW</div></div>
        `;
        box.appendChild(item);
      });
    }

    function renderFxSummary(){
      const box = document.getElementById('fxSummary');
      box.innerHTML = countries.slice(0,6).map(c => `
        <div class="summary-item"><div class="label">${c.code} (${c.currency})</div><div class="value">${fmtSmart(fxRates[c.code] || 0, c.code)}</div></div>
      `).join('');
    }

    function renderFeeSummary(){
      const box = document.getElementById('feeSummary');
      box.innerHTML = countries.slice(0,6).map(c => {
        const t = (totalPercentFee(c.code) * 100).toFixed(2);
        return `<div class="summary-item"><div class="label">${c.code} 총 비율</div><div class="value">${t}%</div></div>`;
      }).join('');
    }

    function buildFxTable(){
      const tb = document.getElementById('fxTable');
      tb.innerHTML = countries.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.currency}</td>
          <td><input type="number" step="0.0001" data-fx="${c.code}" value="${fxRates[c.code] ?? ''}"></td>
        </tr>
      `).join('');
    }

    function buildFeeTable(){
      const tb = document.getElementById('feeTable');
      let html = '';
      feeStructure.forEach(row => {
        if (row.type === 'category') {
          html += `<tr class="cat-row"><td colspan="9">${row.label}</td></tr>`;
        } else {
          html += `<tr><td>${row.label}</td>${countries.map(c => `<td><input type="number" step="0.01" data-fee-code="${c.code}" data-fee-key="${row.key}" value="${feeRates[c.code]?.[row.key] ?? 0}"></td>`).join('')}</tr>`;
        }
      });
      tb.innerHTML = html;
    }

    async function loadShippingTables(){
      const fileMap = {
        SG:'shipping_sg.json', PH:'shipping_ph.json', VN:'shipping_vn.json', BR:'shipping_br.json', TH:'shipping_th.json', MX:'shipping_mx.json'
      };
      await Promise.all(Object.entries(fileMap).map(async ([code, file]) => {
        try{
          const res = await fetch(file);
          if (!res.ok) throw new Error(file);
          shippingTables[code] = await res.json();
        }catch{
          shippingTables[code] = [];
        }
      }));
    }

    function openModal(id){ document.getElementById(id).classList.add('show'); }
    function closeModal(id){ document.getElementById(id).classList.remove('show'); }

    document.getElementById('calcBtn').addEventListener('click', renderResults);
    document.getElementById('resetBtn').addEventListener('click', () => {
      ['productName','cost','pack','domestic','margin','actualWeight','length','width','height'].forEach(id => document.getElementById(id).value = (id==='margin' ? 25 : ''));
      ['cost','pack','domestic','actualWeight','length','width','height'].forEach(id => document.getElementById(id).value ||= 0);
      renderResults();
    });
    document.getElementById('openFx').addEventListener('click', () => { buildFxTable(); openModal('fxModalWrap'); });
    document.getElementById('openFee').addEventListener('click', () => { buildFeeTable(); openModal('feeModalWrap'); });
    document.getElementById('hanaBtn').addEventListener('click', () => window.open('https://search.naver.com/search.naver?where=nexearch&sm=top_hty&fbm=0&ie=utf8&query=%ED%99%98%EC%9C%A8&ackey=umg33s7c', '_blank'));

    document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', e => closeModal(e.currentTarget.dataset.close)));
    document.getElementById('saveFx').addEventListener('click', () => {
      document.querySelectorAll('[data-fx]').forEach(el => fxRates[el.dataset.fx] = +el.value || 0);
      saveJson(storageKeyFx, fxRates); renderFxSummary(); renderResults(); closeModal('fxModalWrap');
    });
    document.getElementById('saveFee').addEventListener('click', () => {
      document.querySelectorAll('[data-fee-code]').forEach(el => {
        feeRates[el.dataset.feeCode][el.dataset.feeKey] = +el.value || 0;
      });
      saveJson(storageKeyFee, feeRates); renderFeeSummary(); renderResults(); closeModal('feeModalWrap');
    });

    document.querySelectorAll('.modal-backdrop').forEach(bg => bg.addEventListener('click', e => {
      if (e.target === bg) bg.classList.remove('show');
    }));

    loadShippingTables().then(() => {
      renderFxSummary();
      renderFeeSummary();
      renderResults();
    });
  </script>
</body>
</html>
