<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>쇼피 마진 계산기</title>
  <style>
    :root { --border:#d9d9d9; --text:#111; --muted:#666; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Noto Sans KR, sans-serif; color:var(--text); margin:0; background:#fff; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { margin: 0 0 18px; color:var(--muted); }
    label { display:block; margin: 14px 0 8px; font-weight: 700; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    .note { margin: 10px 0 14px; color:var(--muted); font-size: 13px; line-height: 1.4; }
    button {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f6f6f6;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }
    .card {
      margin-top: 18px;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px 16px;
      background: #fff;
    }
    .card h2 { margin: 0 0 10px; font-size: 18px; }
    .lines { white-space: pre-line; line-height: 1.55; font-size: 15px; }
    .warn { color:#b00020; font-size: 13px; margin-top: 10px; white-space: pre-line; }
    .ok { color:#0b7; font-size: 13px; margin-top: 10px; white-space: pre-line; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>쇼피 마진 계산기</h1>
    <p class="sub">이 페이지는 테스트입니다. (곧 계산기 붙일 예정)</p>

    <label for="cost">구입가격 (KRW)</label>
    <input id="cost" type="number" inputmode="numeric" value="33000" />

    <label for="domestic">국내배송비 (KRW)</label>
    <input id="domestic" type="number" inputmode="numeric" value="1000" />

    <label for="pack">기자재/포장비 (KRW)</label>
    <input id="pack" type="number" inputmode="numeric" value="0" />

    <label for="margin">희망마진 (KRW)</label>
    <input id="margin" type="number" inputmode="numeric" value="500" />

    <label for="weight">제품무게 (g)</label>
    <input id="weight" type="number" inputmode="numeric" value="173" />

    <label for="vol">부피무게 (g) (없으면 0)</label>
    <input id="vol" type="number" inputmode="numeric" value="0" />

    <p class="note">
      * 적용무게 = max(제품무게, 부피무게) 후 <b>10g 단위 올림</b><br/>
      * 대만(NTD) / 말레이시아(MYR)는 공식 규칙으로 표 전체 입력 불필요 (10g당 고정 단가)<br/>
      * 싱가포르(SGD) / 필리핀(PHP) / 베트남(VND)은 표 기반이라
      <b>shipping_sg.json</b>, <b>shipping_ph.json</b>, <b>shipping_vn.json</b> 파일이 필요
    </p>

    <button id="calcBtn">계산하기(테스트)</button>

    <div class="card">
      <h2>테스트 결과</h2>
      <div id="result" class="lines">-</div>
      <div id="status" class="warn"></div>
    </div>
  </div>

  <script>
    // ================================
    // 1) 표 기반 국가: SG / PH / VN
    //    - repo 루트에 shipping_sg.json / shipping_ph.json / shipping_vn.json 생성해서 넣으면 자동 로드
    //    - 형식: { "10": 0.40, "20": 0.40, ... }  (키는 g, 값은 통화)
    // ================================
    const rateTables = {
      sg: null,
      ph: null,
      vn: null,
    };

    async function loadJsonTable(path) {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`${path} 로드 실패 (${res.status})`);
      const obj = await res.json();

      const map = new Map();
      for (const [k, v] of Object.entries(obj)) {
        const kk = Number(String(k).replace(/,/g, ""));
        const vv = Number(String(v).replace(/,/g, ""));
        if (Number.isFinite(kk) && Number.isFinite(vv)) map.set(kk, vv);
      }
      return map;
    }

    async function ensureTablesLoaded() {
      const errors = [];
      if (!rateTables.sg) {
        try { rateTables.sg = await loadJsonTable("./shipping_sg.json"); }
        catch (e) { errors.push(String(e.message || e)); }
      }
      if (!rateTables.ph) {
        try { rateTables.ph = await loadJsonTable("./shipping_ph.json"); }
        catch (e) { errors.push(String(e.message || e)); }
      }
      if (!rateTables.vn) {
        try { rateTables.vn = await loadJsonTable("./shipping_vn.json"); }
        catch (e) { errors.push(String(e.message || e)); }
      }
      return errors;
    }

    function lookupFromMap(map, applied) {
      if (!map) return null;

      if (map.has(applied)) return map.get(applied);

      const rounded = Math.ceil(applied / 10) * 10;
      if (map.has(rounded)) return map.get(rounded);

      // 안전장치: 표가 끊겨있을 때 대비(가장 가까운 이하 키)
      let bestKey = null;
      for (const k of map.keys()) {
        if (k <= rounded && (bestKey === null || k > bestKey)) bestKey = k;
      }
      if (bestKey !== null) return map.get(bestKey);

      return null;
    }

    // ================================
    // 2) 규칙 기반 국가: TW / MY
    // ================================
    function calcTW(applied) { // NTD: 10g = 1.30
      return (applied / 10) * 1.30;
    }
    function calcMY(applied) { // MYR: 10g = 0.20
      return (applied / 10) * 0.20;
    }

    // ================================
    // 3) 포맷: .00이면 소수점 제거
    // ================================
    function n(x) {
      const v = Number(x);
      return Number.isFinite(v) ? v : 0;
    }

    function fmtIntNoDecimal(x) {
      const v = Math.round(Number(x));
      return Number.isFinite(v) ? v.toLocaleString() : "-";
    }

    function fmtMoney(x, decimals = 2) {
      if (x === null || x === undefined) return "-";
      const v = Number(x);
      if (!Number.isFinite(v)) return "-";
      const fixed = v.toFixed(decimals);
      // 끝이 .00 이면 소수점 제거
      if (fixed.endsWith(".00")) return String(Math.round(v));
      return fixed;
    }

    async function onCalc() {
      const cost = n(document.getElementById("cost").value);
      const domestic = n(document.getElementById("domestic").value);
      const pack = n(document.getElementById("pack").value);
      const margin = n(document.getElementById("margin").value);
      const weight = n(document.getElementById("weight").value);
      const vol = n(document.getElementById("vol").value);

      const raw = Math.max(weight, vol);
      const applied = Math.ceil(raw / 10) * 10;

      const total = cost + domestic + pack + margin;

      const loadErrors = await ensureTablesLoaded();

      const sg = lookupFromMap(rateTables.sg, applied); // SGD
      const ph = lookupFromMap(rateTables.ph, applied); // PHP
      const vn = lookupFromMap(rateTables.vn, applied); // VND (정수)

      const tw = calcTW(applied); // NTD
      const my = calcMY(applied); // MYR

      const lines = [
        `- 합계(원가+국내배송+포장+희망마진) = ${fmtIntNoDecimal(total)} KRW`,
        `- 적용무게 = ${fmtIntNoDecimal(applied)}g`,
        ``,
        `- 싱가포르 판매자부담 배송비(hidden fee) = ${fmtMoney(sg, 2)} SGD`,
        `- 대만 판매자부담 배송비(hidden fee) = ${fmtMoney(tw, 2)} NTD`,
        `- 말레이시아 판매자부담 배송비(hidden fee) = ${fmtMoney(my, 2)} MYR`,
        `- 필리핀 판매자부담 배송비(hidden fee) = ${fmtMoney(ph, 2)} PHP`,
        `- 베트남 판매자부담 배송비(hidden fee) = ${vn === null ? "-" : fmtIntNoDecimal(vn)} VND`,
      ].join("\n");

      document.getElementById("result").textContent = lines;

      const statusEl = document.getElementById("status");
      if (loadErrors.length) {
        statusEl.className = "warn";
        statusEl.textContent =
          `⚠️ 참고: 표 기반 파일을 못 불러왔어.\n` +
          `- shipping_sg.json / shipping_ph.json / shipping_vn.json이 repo에 있어야 정상 표시돼.\n` +
          `- 에러: ${loadErrors.join(" | ")}`;
      } else {
        const missing = [];
        if (sg === null) missing.push("SG");
        if (ph === null) missing.push("PH");
        if (vn === null) missing.push("VN");

        if (missing.length) {
          statusEl.className = "warn";
          statusEl.textContent = `⚠️ ${missing.join(", ")}: 적용무게(${applied}g) 키가 JSON에 없어. (해당 무게 행 추가 필요)`;
        } else {
          statusEl.className = "ok";
          statusEl.textContent = `✅ 계산 완료`;
        }
      }
    }

    document.getElementById("calcBtn").addEventListener("click", onCalc);
  </script>
</body>
</html>
