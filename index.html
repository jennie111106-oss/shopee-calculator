<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shopee 마진 계산기</title>
  <style>
    body { font-family: Arial, "Malgun Gothic", sans-serif; margin: 24px; }
    .box { max-width: 720px; margin: 0 auto; padding: 16px; border: 1px solid #eee; border-radius: 16px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 12px; color: #555; }
    label { display: grid; gap: 6px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px; cursor: pointer; }
    .grid { margin-top: 12px; display: grid; gap: 10px; max-width: 360px; }
    .result { padding: 10px; border: 1px solid #eee; border-radius: 12px; white-space: pre-line; }
    .hint { font-size: 12px; color: #777; }
  </style>
</head>

<body>
  <div class="box">
    <h1>쇼피 마진 계산기</h1>
    <p>이 페이지는 테스트입니다. (곧 계산기 붙일 예정)</p>

    <div class="grid">
      <label>구입가격 (KRW)
        <input id="cost" type="number" value="33000">
      </label>

      <label>국내배송비 (KRW)
        <input id="domestic" type="number" value="1000">
      </label>

      <label>기자재/포장비 (KRW)
        <input id="pack" type="number" value="0">
      </label>

      <label>희망마진 (KRW)
        <input id="margin" type="number" value="500">
      </label>

      <label>제품무게 (g)
        <input id="weight_g" type="number" value="173">
      </label>

      <label>부피무게 (g) (없으면 0)
        <input id="vol_g" type="number" value="0">
      </label>

      <div class="hint">* 적용무게 = max(제품무게, 부피무게) 후 10g 단위 올림</div>

      <button id="calcBtn">계산하기(테스트)</button>

      <div id="result" class="result">결과가 여기 뜹니다.</div>
    </div>
  </div>

  <script>
    // ✅ 싱가포르 배송표(JSON) 로드 (10g~1470g 등 구간)
    let SG_TABLE = {};
    fetch("./shipping_sg.json")
      .then(res => res.json())
      .then(data => { SG_TABLE = data || {}; })
      .catch(() => { SG_TABLE = {}; });

    document.getElementById("calcBtn").addEventListener("click", () => {
      const cost = Number(document.getElementById("cost").value || 0);
      const domestic = Number(document.getElementById("domestic").value || 0);
      const pack = Number(document.getElementById("pack").value || 0);
      const margin = Number(document.getElementById("margin").value || 0);

      const weight = Number(document.getElementById("weight_g").value || 0);
      const vol = Number(document.getElementById("vol_g").value || 0);

      const raw = Math.max(weight, vol);
      const applied = Math.ceil(raw / 10) * 10;

      const total = cost + domestic + pack + margin;

      // ✅ 싱가포르 배송비: 1) JSON에서 찾고 2) 없으면(1480g 이상) 공식으로 계산
      let sgShip = SG_TABLE[String(applied)] ?? "-";

      if (sgShip === "-" && applied >= 1480) {
        if (applied <= 1500) {
          sgShip = 11.50;
        } else {
          // 1510~1600: 12.20 / 이후 100g마다 +0.70
          const steps = Math.floor((applied - 1510) / 100);
          sgShip = 12.20 + 0.70 * steps;
        }
      }
      const sgShipText = (sgShip === "-") ? "-" : Number(sgShip).toFixed(2);

      // ✅ 대만 배송비: 10g당 1.30 NTD (표가 완전 선형이라 공식으로 처리)
      // 10g -> 1.30, 20g -> 2.60 ... 20000g -> 2600.00
      let twShip = "-";
      if (applied >= 10 && applied <= 20000) {
        twShip = (applied / 10) * 1.30;
      }
      const twShipText = (twShip === "-") ? "-" : Number(twShip).toFixed(2);

      document.getElementById("result").textContent =
        `테스트 결과\n` +
        `- 합계(원가+국내배송+포장+희망마진) = ${total.toLocaleString()} KRW\n` +
        `- 적용무게 = ${applied}g\n` +
        `- 싱가포르 판매자부담 배송비 = ${sgShipText} SGD\n` +
        `- 대만 판매자부담 배송비 = ${twShipText} NTD`;
    });
  </script>
</body>
</html>
