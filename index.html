<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Shopee Calculator</title>
<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:30px}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:20px}
label{display:block;margin-bottom:6px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
button{padding:12px 18px;border:none;border-radius:8px;background:linear-gradient(90deg,#ff7ab6,#7dd3fc);color:#000;font-weight:bold;margin-top:20px}
.result{font-size:22px;font-weight:bold;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h2>상품 정보</h2>

<div class="grid">
<div>
<label>제품구매가 (KRW)</label>
<input id="cost" type="number" value="0">
</div>

<div>
<label>포장비용 (KRW)</label>
<input id="pack" type="number" value="0">
</div>

<div>
<label>국내배송비 (KRW)</label>
<input id="domestic" type="number" value="0">
</div>

<div>
<label>희망 마진 (KRW)</label>
<input id="margin" type="number" value="0">
</div>

<div>
<label>가로 (cm)</label>
<input id="length" type="number" value="0">
</div>

<div>
<label>세로 (cm)</label>
<input id="width" type="number" value="0">
</div>

<div>
<label>높이 (cm)</label>
<input id="height" type="number" value="0">
</div>

</div>

<div class="result">
부피무게: <span id="volWeight">0</span> kg
</div>

<button onclick="calc()">계산하기</button>

<div class="result">
최종 판매가: <span id="price">0</span> KRW
</div>

</div>

<script>

function calcVol(){
let l=Number(document.getElementById("length").value||0)
let w=Number(document.getElementById("width").value||0)
let h=Number(document.getElementById("height").value||0)

let vol=(l*w*h)/6000

document.getElementById("volWeight").innerText=vol.toFixed(3)
}

["length","width","height"].forEach(id=>{
document.getElementById(id).addEventListener("input",calcVol)
})

function calc(){

let cost=Number(document.getElementById("cost").value||0)
let pack=Number(document.getElementById("pack").value||0)
let domestic=Number(document.getElementById("domestic").value||0)
let margin=Number(document.getElementById("margin").value||0)

let total=cost+pack+domestic

let final=total+margin

document.getElementById("price").innerText=Math.round(final)

}

</script>

</body>
</html>
