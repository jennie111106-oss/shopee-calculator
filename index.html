<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Margin Calculator</title>

<style>
:root{
--bg:#081021;
--panel:#101a35;
--panel-2:#162245;
--line:#22376f;
--line-soft:#1a2d5a;
--text:#eef3ff;
--muted:#9fb0da;
--accent:#7aa2ff;
--accent-2:#7cf2d3;
--danger:#ff7b7b;
--shadow:0 14px 34px rgba(0,0,0,.28);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,"Pretendard","Noto Sans KR",system-ui,sans-serif;
background:radial-gradient(circle at top,#14224b 0%,#081021 42%,#050a16 100%);
color:var(--text);
}

.wrap{max-width:1380px;margin:0 auto;padding:24px 20px 48px}

.hero h1{margin:0;font-size:28px;font-weight:800}
.hero p{margin:8px 0 0;color:var(--muted);font-size:14px}

.grid{display:grid;gap:16px}
.top-grid{grid-template-columns:1.2fr 1fr 1fr}
.result-grid{grid-template-columns:repeat(4,minmax(0,1fr))}

.card{
background:linear-gradient(180deg,rgba(20,33,69,.94),rgba(12,20,42,.98));
border:1px solid var(--line-soft);
border-radius:var(--radius);
box-shadow:var(--shadow);
}

.card-head{padding:18px 18px 0}
.card-body{padding:18px}

.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}

.field label{font-size:13px;color:#dfe8ff;font-weight:700}

.field input{
width:100%;
height:46px;
border-radius:14px;
border:1px solid var(--line);
background:#0c1632;
color:var(--text);
padding:0 14px;
font-size:15px;
}

.vol-box{
margin-top:16px;
padding:16px;
border:1px solid var(--line);
border-radius:18px;
background:linear-gradient(180deg,rgba(20,33,69,.55),rgba(12,20,42,.65));
}

.vol-grid{
display:grid;
grid-template-columns:1.05fr 1.45fr;
gap:18px;
align-items:end;
}

.vol-side .value{
min-height:46px;
display:flex;
align-items:center;
font-size:24px;
font-weight:800;
}

.dim-row{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:12px;
}

.dim-wrap input{
width:100%;
height:46px;
border-radius:14px;
border:1px solid var(--line);
background:#0c1632;
color:var(--text);
padding:0 14px;
}

.btn{
border:none;
border-radius:12px;
padding:11px 14px;
font-weight:700;
cursor:pointer;
background:#24396f;
color:var(--text);
}

.btn.primary{
background:linear-gradient(135deg,#ff8b7c,#ff6cab);
}

.result-card{
padding:16px;
border:1px solid var(--line);
border-radius:16px;
background:linear-gradient(180deg,rgba(8,16,37,.3),rgba(8,16,37,.55));
}

.metric{
display:flex;
justify-content:space-between;
padding:8px 0;
border-top:1px dashed rgba(159,176,218,.18);
}

.metric .v{font-weight:800}

</style>
</head>

<body>

<div class="wrap">

<section class="hero">
<h1>Shopee Margin Calculator</h1>
<p>다크톤 구조 · 설정은 카드 안에서 관리</p>
</section>

<section class="grid top-grid">

<article class="card">
<div class="card-head">
<h2>상품 정보</h2>
</div>

<div class="card-body">

<div class="field-grid">

<div class="field">
<label>상품명</label>
<input id="productName">
</div>

<div class="field">
<label>제품구매가 (KRW)</label>
<input id="cost" type="number" value="0">
</div>

<div class="field">
<label>포장비용 (KRW)</label>
<input id="pack" type="number" value="0">
</div>

<div class="field">
<label>국내배송비 (KRW)</label>
<input id="domestic" type="number" value="0">
</div>

<div class="field">
<label>희망 마진 (KRW)</label>
<input id="margin" type="number" value="0">
</div>

<div class="field">
<label>실중량 (g)</label>
<input id="actualWeight" type="number" value="0">
</div>

</div>

<div class="vol-box">

<div class="vol-grid">

<div class="vol-side">
<div>부피무게</div>
<div id="volWeightPreview">-</div>
</div>

<div class="dim-row">

<div class="dim-field">
<label>가로</label>
<div class="dim-wrap">
<input id="length" type="number" value="0">
</div>
</div>

<div class="dim-field">
<label>세로</label>
<div class="dim-wrap">
<input id="width" type="number" value="0">
</div>
</div>

<div class="dim-field">
<label>높이</label>
<div class="dim-wrap">
<input id="height" type="number" value="0">
</div>
</div>

</div>
</div>
</div>

<button class="btn primary" id="calcBtn">계산하기</button>

</div>
</article>

</section>

<section class="grid result-grid" id="results"></section>

</div>

<script>

const countries=[
{code:"SG",name:"싱가포르",currency:"SGD"},
{code:"TW",name:"대만",currency:"TWD"},
{code:"TH",name:"태국",currency:"THB"},
{code:"MY",name:"말레이시아",currency:"MYR"},
{code:"VN",name:"베트남",currency:"VND"},
{code:"PH",name:"필리핀",currency:"PHP"},
{code:"BR",name:"브라질",currency:"BRL"},
{code:"MX",name:"멕시코",currency:"MXN"}
]

function getBaseCost(){
return (
(+document.getElementById("cost").value||0)+
(+document.getElementById("pack").value||0)+
(+document.getElementById("domestic").value||0)
)
}

function updateVolWeight(){

const l=Number(document.getElementById("length").value||0)
const w=Number(document.getElementById("width").value||0)
const h=Number(document.getElementById("height").value||0)

const vol=(l*w*h)/6000

document.getElementById("volWeightPreview").innerText=
vol?vol.toFixed(3)+" kg":"-"

}

["length","width","height"].forEach(id=>{
document.getElementById(id).addEventListener("input",updateVolWeight)
})

function calculateCountry(code){

const base=getBaseCost()
const margin=+document.getElementById("margin").value||0

const percentFee=0

let final=(base+margin)/(1-percentFee)

return{
finalLocal:final,
recommended:final*1.3
}

}

function renderResults(){

const box=document.getElementById("results")
box.innerHTML=""

countries.forEach(c=>{

const r=calculateCountry(c.code)

const el=document.createElement("div")
el.className="result-card"

el.innerHTML=`

<div class="metric">
<div>최종판매가</div>
<div class="v">${Math.round(r.finalLocal)}</div>
</div>

<div class="metric">
<div>추천등록가</div>
<div class="v">${Math.round(r.recommended)}</div>
</div>

`

box.appendChild(el)

})

}

document.getElementById("calcBtn").addEventListener("click",renderResults)

</script>

</body>
</html>
